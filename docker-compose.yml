services:
  db:
    image: postgres:16-alpine
    container_name: santiye_guvenlik_db
    restart: unless-stopped
    environment:
      POSTGRES_DB: santiye_guvenlik
      POSTGRES_USER: santiye
      POSTGRES_PASSWORD: santiye123
    ports:
      - "5432:5432"
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./database/schema.sql:/docker-entrypoint-initdb.d/01-schema.sql:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U santiye -d santiye_guvenlik"]
      interval: 5s
      timeout: 3s
      retries: 10

volumes:
  postgres-data:
